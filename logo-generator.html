<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700&display=swap" rel="stylesheet">
  <script>
    window.onload = function() {
      const canvas = document.getElementById('logo');
      const ctx = canvas.getContext('2d');
      const w = 400, h = 200;
      canvas.width = w;
      canvas.height = h;

      ctx.clearRect(0, 0, w, h);

      // Draw triangle/arrow
      const cx = w / 2;
      ctx.strokeStyle = '#1e3a8a';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      // Triangle
      ctx.beginPath();
      ctx.moveTo(cx, 20);
      ctx.lineTo(cx + 45, 60);
      ctx.lineTo(cx - 45, 60);
      ctx.closePath();
      ctx.stroke();

      // H and A letters stylized
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.fillStyle = '#1e3a8a';
      ctx.textAlign = 'center';
      
      // Draw HA monogram
      ctx.font = '700 60px Arial, sans-serif';
      ctx.fillText('HA', cx, 120);

      // Draw line under monogram
      ctx.beginPath();
      ctx.moveTo(cx - 50, 130);
      ctx.lineTo(cx + 50, 130);
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw "HADITHI AHLIA" in Raleway
      ctx.font = '600 22px Raleway, sans-serif';
      ctx.letterSpacing = '5px';
      ctx.fillStyle = '#1e3a8a';
      ctx.fillText('HADITHI AHLIA', cx, 160);

      // Download link
      const link = document.getElementById('download');
      link.href = canvas.toDataURL('image/png');
      link.download = 'logo.png';
      link.style.display = 'block';
    };
  </script>
</head>
<body style="background:#f5f5f5; display:flex; flex-direction:column; align-items:center; padding:50px;">
  <h2>Logo Preview (Raleway)</h2>
  <canvas id="logo" style="background:white; border:1px solid #ddd; border-radius:8px;"></canvas>
  <br>
  <a id="download" style="display:none; padding:12px 24px; background:#1e3a8a; color:white; text-decoration:none; border-radius:8px; margin-top:20px;">Download Logo PNG</a>
  <p style="color:#888; margin-top:16px;">Click the button above to download, then replace logo.png in your project</p>
</body>
</html>
